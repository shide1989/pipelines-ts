name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm typecheck

  test:
    name: Test (integration + multiworker)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pipelines
          POSTGRES_PASSWORD: pipelines
          POSTGRES_DB: pipelines
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pipelines"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://pipelines:pipelines@localhost:5432/pipelines
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # 30s per-test: multiworker tests wait up to 15s for SIGKILL recovery
      # (bun default is 5s — would false-fail those tests in CI).
      - run: bun test packages/runtime --timeout 30000
